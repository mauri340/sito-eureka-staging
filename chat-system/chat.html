<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat con Mentor Eureka</title>
    <style>
        /* Import del font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap');

        /* Stili Generali (basati sulla struttura di riferimento) */
        html {
            box-sizing: border-box;
        }
        *, *:before, *:after {
            box-sizing: inherit;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0f2f5;
            color: #1a202c;
            line-height: 1.7;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* Contenitore principale della pagina chat (struttura di riferimento) */
        #chat-page-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            background-color: #f0f2f5;
        }

        /* Contenitore della chat con altezza fissa (come nel riferimento) */
        #chat-fullscreen {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            background-color: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Override per il widget chat per integrarlo nella struttura */
        #ew-chat-widget #ew-chat-box {
            position: relative !important;
            bottom: auto !important;
            right: auto !important;
            width: 100% !important;
            height: 100% !important;
            max-width: none !important;
            max-height: none !important;
            border-radius: 16px !important;
            transform: none !important;
            opacity: 1 !important;
            pointer-events: auto !important;
            box-shadow: none !important;
            border: none !important;
            background: transparent !important;
            display: flex !important;
            flex-direction: column !important;
        }

        /* Nasconde il toggle del widget */
        #ew-chat-widget #ew-chat-toggle {
            display: none !important;
        }

        /* Assicura che l'header del widget sia fisso */
        #ew-chat-widget #ew-chat-header {
            flex-shrink: 0 !important;
            padding: 15px 20px !important;
            border-bottom: 1px solid #e2e8f0 !important;
        }

        /* Area messaggi con scroll interno */
        #ew-chat-widget #ew-chat-messages {
            flex-grow: 1 !important;
            overflow-y: auto !important;
            padding: 20px !important;
            display: flex !important;
            flex-direction: column !important;
            gap: 15px !important;
        }

        /* Form input fisso in fondo */
        #ew-chat-widget #ew-chat-input {
            flex-shrink: 0 !important;
            padding: 15px !important;
            border-top: 1px solid #e2e8f0 !important;
            background-color: #f8f9fa !important;
        }

        /* Stili per i messaggi (basati sul riferimento) */
        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 75%;
            line-height: 1.5;
        }
        .user {
            background-color: #007bff;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            color: #1a202c;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        /* Footer fisso (come nel riferimento) */
        .site-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #ffffff;
            border-top: 1px solid #e2e8f0;
            padding: 15px 0;
            text-align: center;
            font-size: 0.85rem;
            color: #6c757d;
            z-index: 1000;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }
        .site-footer a {
            color: #4a5568;
            text-decoration: none;
            margin: 0 10px;
            transition: color 0.2s ease;
        }
        .site-footer a:hover {
            color: #007bff;
            text-decoration: underline;
        }

        /* Media queries per mobile */
        @media (max-width: 768px) {
            #chat-page-container {
                padding: 10px;
            }
            
            #chat-fullscreen {
                height: 90vh;
                max-width: 100%;
                border-radius: 8px;
            }
        }

        /* Stili mobile specifici (dalla referenza mobile) */
        @media (max-width: 600px) {
            body {
                -webkit-text-size-adjust: 100%;
                background: #f5f7fb;
            }

            #chat-page-container, #chat-fullscreen {
                min-height: 100dvh;
                overflow-x: visible;
            }

            #ew-chat-widget #ew-chat-messages {
                background: #fafafa !important;
                -webkit-overflow-scrolling: touch !important;
                scroll-padding-bottom: 120px !important;
                scroll-behavior: smooth !important;
            }

            #ew-chat-widget #ew-chat-input {
                position: sticky !important;
                bottom: 0 !important;
                z-index: 20 !important;
                box-shadow: 0 -6px 18px rgba(17,24,39,.06) !important;
            }
        }
    </style>
</head>
<body>
    <div id="chat-page-container">
        <div id="chat-fullscreen">
            <!-- Chat widget will be injected here -->
        </div>
    </div>

    <footer class="site-footer">
        <div>
            <a href="https://www.iubenda.com/privacy-policy/89530968" title="Privacy Policy">Privacy Policy</a> •
            <a href="https://www.iubenda.com/privacy-policy/89530968/cookie-policy" title="Cookie Policy">Cookie Policy</a> •
            <a href="https://www.iubenda.com/termini-e-condizioni/89530968" title="Termini e Condizioni">Termini e Condizioni</a>
        </div>
    </footer>

    <!-- Disable global chat widget for this dedicated chat page -->
    <script>window.DISABLE_CHAT_WIDGET = true;</script>
    
    <!-- Load chat widget -->
    <script src="../chat-widget.js"></script>
    
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        let chatParams = {};

        async function waitForWidget(callback, maxWait = 5000) {
            const start = Date.now();
            while (Date.now() - start < maxWait) {
                if (window.ChatWidget) {
                    callback();
                    return;
                }
                await new Promise(r => setTimeout(r, 100));
            }
            console.error('ChatWidget non disponibile');
        }

        async function initializeChat() {
            if (token) {
              try {
                const response = await fetch(
                  `https://ai-chat-service-nls9.onrender.com/api/quiz/token/${token}`
                );
                const data = await response.json();
                if (data.valid) {
                  chatParams = data.data;
                } else {
                  throw new Error('Token non valido');
                }
              } catch (error) {
                // Fallback — leggi parametri URL
                chatParams = {
                  quiz_status: urlParams.get('quiz_status'),
                  nome: urlParams.get('nome'),
                  cognome: urlParams.get('cognome'),
                  email: urlParams.get('email'),
                  telefono: urlParams.get('telefono'),
                  pam: urlParams.get('pam'),
                  punteggio: urlParams.get('punteggio'),
                  punteggio1: urlParams.get('punteggio1'),
                  punteggio2: urlParams.get('punteggio2'),
                  miglioramento: urlParams.get('miglioramento'),
                  fatturato_attuale: urlParams.get('fatturato_attuale'),
                  fatturato_potenziale: urlParams.get('fatturato_potenziale'),
                  crescita_potenziale: urlParams.get('crescita_potenziale'),
                  criticita_opportunita: urlParams.get('criticita_opportunita'),
                  criticita_inefficienza: urlParams.get('criticita_inefficienza'),
                  criticita_competitivita: urlParams.get('criticita_competitivita'),
                  criticita_innovazione: urlParams.get('criticita_innovazione')
                };
              }
            } else {
              // Nessun token — leggi parametri URL direttamente
              chatParams = {
                quiz_status: urlParams.get('quiz_status'),
                nome: urlParams.get('nome'),
                cognome: urlParams.get('cognome'),
                email: urlParams.get('email'),
                telefono: urlParams.get('telefono'),
                pam: urlParams.get('pam'),
                punteggio: urlParams.get('punteggio'),
                punteggio1: urlParams.get('punteggio1'),
                punteggio2: urlParams.get('punteggio2'),
                miglioramento: urlParams.get('miglioramento'),
                fatturato_attuale: urlParams.get('fatturato_attuale'),
                fatturato_potenziale: urlParams.get('fatturato_potenziale'),
                crescita_potenziale: urlParams.get('crescita_potenziale'),
                criticita_opportunita: urlParams.get('criticita_opportunita'),
                criticita_inefficienza: urlParams.get('criticita_inefficienza'),
                criticita_competitivita: urlParams.get('criticita_competitivita'),
                criticita_innovazione: urlParams.get('criticita_innovazione')
              };
            }

            // Usa il polling per aspettare che il widget sia disponibile
            waitForWidget(() => {
                window.ChatWidget.init(chatParams);
                window.ChatWidget.open();
            });
        }

        // Avvia l'inizializzazione quando il DOM è caricato
        initializeChat();
    </script>
</body>
</html>
