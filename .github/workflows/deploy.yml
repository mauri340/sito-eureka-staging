name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup chiave SSH + lftp
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP mirror (nessun comando remoto — hosting senza shell)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_DIR: public_html
        run: |
          lftp -u "${SSH_USER},x" "sftp://${SSH_HOST}" -e "
            set sftp:connect-program \"ssh -a -x -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no\";
            set net:timeout 20;
            set net:max-retries 2;
            set mirror:parallel-transfer-count 4;
            mirror -R --verbose --no-perms --exclude .git/ --exclude .github/ --exclude .cursor/ ./ ${REMOTE_DIR};
            bye
          "
