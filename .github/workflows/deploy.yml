name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Deploy via SSH rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --timeout=120 --rsync-path=/usr/bin/rsync --exclude=.git --exclude=.cursor --exclude=.github
          path: ./
          remote_path: /home/apprendimedoit/public_html/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          rsh: -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -o ServerAliveCountMax=6
