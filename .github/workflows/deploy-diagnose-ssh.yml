# Diagnostica SSH/SFTP — lancia manualmente da GitHub Actions → Run workflow
name: Diagnose deploy SSH

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SFTP list home and paths
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -x
          sftp -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -b - \
            "${SSH_USER}@${SSH_HOST}" <<'EOF' || true
          pwd
          ls -la
          ls -la staging.apprendimentorapido.it
          ls -la public_html
          quit
          EOF

      - name: SFTP upload tiny test file
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          echo "deploy-test-$(date -u +%Y%m%dT%H%M%SZ)" > /tmp/deploy-test.txt
          sftp -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -b - \
            "${SSH_USER}@${SSH_HOST}" <<'EOF'
          put /tmp/deploy-test.txt deploy-test.txt
          ls -la deploy-test.txt
          rm deploy-test.txt
          quit
          EOF
