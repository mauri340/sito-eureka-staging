# Diagnostica SSH — lancia manualmente da GitHub Actions → Run workflow
name: Diagnose deploy SSH

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH checks on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -x
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -vvv \
            "${SSH_USER}@${SSH_HOST}" echo HELLO 2>&1 | tail -30
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" whoami
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" pwd
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" "ls -ld public_html staging.apprendimentorapido.it"
