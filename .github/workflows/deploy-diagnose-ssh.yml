# Diagnostica SSH — lancia manualmente da GitHub Actions → Run workflow
name: Diagnose deploy SSH

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: SSH checks on server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -x
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            -o RequestTTY=no \
            "${SSH_USER}@${SSH_HOST}" \
            'echo "=== whoami / pwd ==="; whoami; pwd; echo "SHELL=$SHELL"; echo "=== tools ==="; which tar scp rsync 2>/dev/null || true; tar --version 2>/dev/null | head -1 || echo "tar missing"; echo "=== disk ==="; df -h . 2>/dev/null | tail -1 || df -h ~ | tail -1; echo "=== paths ==="; ls -ld public_html staging.apprendimentorapido.it 2>&1; echo "=== write test ==="; touch staging.apprendimentorapido.it/.deploy-write-test && echo STAGING_WRITABLE && rm -f staging.apprendimentorapido.it/.deploy-write-test || echo STAGING_NOT_WRITABLE; echo DONE'
