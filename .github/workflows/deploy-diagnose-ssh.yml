# Diagnostica SSH/SFTP — lancia manualmente da GitHub Actions → Run workflow
name: Diagnose deploy SSH

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Test SFTP list (shell-free)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -x
          sftp -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 -b - \
            "${SSH_USER}@${SSH_HOST}" <<'EOF'
          ls -la
          ls -la staging.apprendimentorapido.it
          ls -la public_html
          quit
          EOF

      - name: Test remote shell (optional)
        continue-on-error: true
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" echo HELLO || echo "Remote shell not available (SFTP-only account)"
