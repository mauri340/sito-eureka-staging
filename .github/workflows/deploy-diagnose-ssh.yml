# Diagnostica SSH/SFTP — lancia manualmente da GitHub Actions → Run workflow
name: Diagnose deploy SSH

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: SSH shell test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: 22
          command_timeout: 2m
          script: |
            echo "=== whoami / pwd ==="
            whoami
            pwd
            echo "=== paths ==="
            ls -ld public_html staging.apprendimentorapido.it
            echo "=== write test ==="
            touch staging.apprendimentorapido.it/.deploy-write-test && echo STAGING_WRITABLE
            rm -f staging.apprendimentorapido.it/.deploy-write-test
            echo DONE

      - name: SFTP upload test
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: 22
          source: deploy-diagnose-ssh.yml
          target: staging.apprendimentorapido.it/
          overwrite: true
