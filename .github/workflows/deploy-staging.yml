name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build staging bundle (promo + robots/sitemap che bloccano i crawler)
        run: |
          rm -rf _stage && mkdir -p _stage
          cp -r master-eureka-promo _stage/
          cat > _stage/robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF
          cat > _stage/sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Setup chiave SSH + lftp
        env:
          DEPLOY_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: DIAG sftp verboso (temporaneo)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          echo "=== test sftp -v ==="
          timeout 30 sftp -v -i "$HOME/.ssh/deploy_key" -o BatchMode=yes -o StrictHostKeyChecking=no -P 22 "${SSH_USER}@${SSH_HOST}" <<'EOF' 2>&1 | grep -aiE "Authenticat|Permission|denied|Connection|refused|subsystem|Could not|Offering|Server accepts|debug1: Next|Remote working|sftp>|/home|drwx" | tail -40 || true
          pwd
          ls -la
          ls -la staging.apprendimentorapido.it
          bye
          EOF
          echo "=== fine diag ==="

      - name: Deploy via SFTP mirror (nessun comando remoto — hosting senza shell)
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          REMOTE_DIR: staging.apprendimentorapido.it
        run: |
          lftp -u "${SSH_USER},x" "sftp://${SSH_HOST}" <<LFTP
          set sftp:connect-program "ssh -a -x -i $HOME/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no"
          set net:timeout 20
          set net:max-retries 2
          set mirror:parallel-transfer-count 4
          mirror -R --verbose --no-perms _stage/ ${REMOTE_DIR}
          bye
          LFTP
