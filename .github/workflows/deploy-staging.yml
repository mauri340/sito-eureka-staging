name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Override robots.txt to block all crawlers on staging
        run: |
          cat > robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF

      - name: Override sitemap.xml to be empty on staging
        run: |
          cat > sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Deploy via SSH rsync
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr
          path: ./
          remote_path: /home/apprendimedoit/staging.apprendimentorapido.it/
          remote_host: ${{ secrets.SSH_HOST }}
          remote_user: ${{ secrets.SSH_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
