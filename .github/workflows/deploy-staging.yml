name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Override robots.txt to block all crawlers on staging
        run: |
          cat > robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF

      - name: Override sitemap.xml to be empty on staging
        run: |
          cat > sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Prepare deploy bundle
        run: rm -rf .git .cursor

      - name: Deploy via SCP
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_KEY_PASSPHRASE }}
          port: 22
          source: "robots.txt,sitemap.xml,master-eureka-promo"
          target: staging.apprendimentorapido.it/
          overwrite: true
          debug: true
