name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Override robots.txt to block all crawlers on staging
        run: |
          cat > robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF

      - name: Override sitemap.xml to be empty on staging
        run: |
          cat > sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Prepare deploy bundle
        run: rm -rf .git .cursor

      - name: Setup SSH key
        env:
          SSH_KEY_PASSPHRASE: ${{ secrets.SSH_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          eval "$(ssh-agent -s)"
          if [ -n "${SSH_KEY_PASSPHRASE:-}" ]; then
            ASKPASS_SCRIPT="$(mktemp)"
            printf '#!/bin/sh\necho "%s"\n' "$SSH_KEY_PASSPHRASE" > "$ASKPASS_SCRIPT"
            chmod +x "$ASKPASS_SCRIPT"
            DISPLAY=:0 SSH_ASKPASS="$ASKPASS_SCRIPT" SSH_ASKPASS_REQUIRE=force ssh-add ~/.ssh/deploy_key
            rm -f "$ASKPASS_SCRIPT"
          else
            ssh-add ~/.ssh/deploy_key
          fi

      - name: Deploy via SFTP recursive upload
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euxo pipefail
          sftp -o BatchMode=yes -o ConnectTimeout=30 -b - \
            "${SSH_USER}@${SSH_HOST}" <<'EOF'
          cd staging.apprendimentorapido.it
          put robots.txt
          put sitemap.xml
          put -r master-eureka-promo
          quit
          EOF
          echo "DEPLOY_OK"
