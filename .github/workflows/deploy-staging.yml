name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Override robots.txt to block all crawlers on staging
        run: |
          cat > robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF

      - name: Override sitemap.xml to be empty on staging
        run: |
          cat > sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Prepare deploy bundle
        run: rm -rf .git .cursor

      - name: Setup SSH key and lftp
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Deploy via SFTP mirror (no remote shell)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_DIR: staging.apprendimentorapido.it
        run: |
          set -euxo pipefail
          lftp -u "${SSH_USER},x" "sftp://${SSH_HOST}" -e "
            set sftp:connect-program \"ssh -a -x -i ~/.ssh/deploy_key -o BatchMode=yes -o StrictHostKeyChecking=no\";
            mirror -R --parallel=4 --verbose ./ ${REMOTE_DIR};
            quit"
