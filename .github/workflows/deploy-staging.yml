name: Deploy to Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Override robots.txt to block all crawlers on staging
        run: |
          cat > robots.txt <<'EOF'
          # STAGING — non indicizzare. Vedere robots.txt di produzione su apprendimentorapido.it
          User-agent: *
          Disallow: /
          EOF

      - name: Override sitemap.xml to be empty on staging
        run: |
          cat > sitemap.xml <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          </urlset>
          EOF

      - name: Prepare deploy bundle
        run: rm -rf .git .cursor

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy via tar + scp + ssh
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          REMOTE_DIR: staging.apprendimentorapido.it
        run: |
          set -euxo pipefail
          tar czf /tmp/deploy.tar.gz --exclude='deploy.tar.gz' .
          ls -lh /tmp/deploy.tar.gz
          scp -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            /tmp/deploy.tar.gz "${SSH_USER}@${SSH_HOST}:${REMOTE_DIR}/deploy.tar.gz"
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes -o ConnectTimeout=30 \
            "${SSH_USER}@${SSH_HOST}" \
            "cd ${REMOTE_DIR} && tar xzf deploy.tar.gz && rm -f deploy.tar.gz && echo DEPLOY_OK"
